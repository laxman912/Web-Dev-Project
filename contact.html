<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Hub | Contact</title>
    <link rel="stylesheet" href="./contact.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">FOOTBALL<span>HUB</span></div>
            <ul class="nav-links">
                <li><a href="./index.html">Home</a></li>
                <li><a href="./project/game.html">Game</a></li>
                <li><a href="./project/topics.html">Topics</a></li>
                <li><a href="./files/team.html">Team</a></li>
                <li><a href="#" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-section">
        <h1 class="page-title">GET IN TOUCH</h1>
        <div class="accent-bar"></div>

        <div class="contact-container">
            <form id="football-contact-form">
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" rows="6" placeholder="Your message here..." required></textarea>
                </div>

                <button type="submit" class="send-btn">SEND MESSAGE</button>
            </form>
            <div id="form-status" class="hidden"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Football Hub. Created by Kashyap, Laxman, and Dibya.</p>
    </footer>

    <script src="./contact.js"></script>
</body>
</html>
